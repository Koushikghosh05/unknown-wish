<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reply to Mr. Unknown 💌</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&family=Inter:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0ec 0%, #ffc0d9 40%, #ff99bb 70%, #ffe0ec 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background elements */
    .heart-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      position: absolute;
      opacity: 0.15;
      animation: floatHeart 6s infinite ease-in;
      font-size: 40px;
    }

    @keyframes floatHeart {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.15; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
      border: 2px solid rgba(255, 182, 193, 0.5);
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: #d946a6;
      text-align: center;
      margin-bottom: 15px;
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(217, 70, 166, 0.2);
    }

    .subtitle {
      text-align: center;
      color: #9d4edd;
      font-family: 'Dancing Script', cursive;
      font-size: 18px;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #c2185b;
      font-weight: 500;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid rgba(255, 105, 180, 0.3);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      background: rgba(255, 240, 245, 0.8);
      color: #333;
      transition: all 0.3s ease;
      resize: vertical;
      min-height: 150px;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #ff69b4;
      background: rgba(255, 250, 250, 1);
      box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
      transform: translateY(-2px);
    }

    textarea::placeholder,
    input[type="text"]::placeholder {
      color: #d981b5;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 35px;
    }

    button {
      flex: 1;
      padding: 15px 30px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Inter', sans-serif;
    }

    .btn-submit {
      background: linear-gradient(135deg, #ff69b4 0%, #d946a6 100%);
      color: white;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.4);
      position: relative;
      overflow: hidden;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.6s;
    }

    .btn-submit:hover::before {
      left: 100%;
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(255, 105, 180, 0.5);
    }

    .btn-submit:active {
      transform: translateY(-1px);
    }

    .btn-back {
      background: rgba(217, 70, 166, 0.1);
      color: #d946a6;
      border: 2px solid #d946a6;
    }

    .btn-back:hover {
      background: rgba(217, 70, 166, 0.2);
      transform: translateY(-3px);
    }

    .status-message {
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      font-weight: 500;
      display: none;
      animation: slideDown 0.5s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .status-message.success {
      background: rgba(76, 175, 80, 0.2);
      color: #2e7d32;
      border: 2px solid #4caf50;
    }

    .status-message.error {
      background: rgba(244, 67, 54, 0.2);
      color: #c62828;
      border: 2px solid #f44336;
    }

    .thank-you-container {
      text-align: center;
      display: none;
      animation: slideUp 0.8s ease;
    }

    .thank-you-container.active {
      display: block;
    }

    .thank-you-title {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      color: #d946a6;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .thank-you-message {
      font-family: 'Dancing Script', cursive;
      font-size: 24px;
      color: #c2185b;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .heart-icon {
      font-size: 60px;
      margin-bottom: 20px;
      animation: heartBeat 1.5s infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
    }

    .form-container {
      display: block;
    }

    .form-container.hidden {
      display: none;
    }

    /* Sparkles */
    .sparkle {
      position: absolute;
      pointer-events: none;
    }

    @keyframes sparkle {
      0% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
      100% {
        opacity: 0;
        transform: scale(0) translateY(-20px);
      }
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(217, 70, 166, 0.3);
      border-top-color: #d946a6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 20px;
      }

      .title {
        font-size: 28px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="heart-bg" id="heartContainer"></div>

  <div class="container">
    <div class="card">
      <!-- Form Container -->
      <div class="form-container" id="formContainer">
        <div class="title">💌 Reply to Mr. Unknown</div>
        <div class="subtitle">Share your beautiful thoughts...</div>

        <form id="replyForm" onsubmit="submitReply(event)">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input 
              type="text" 
              id="name" 
              name="name" 
              placeholder="Enter your name..."
              required
            >
          </div>

          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea 
              id="message" 
              name="message" 
              placeholder="Write your heartfelt reply here..."
              required
            ></textarea>
          </div>

          <div class="button-group">
            <button type="submit" class="btn-submit" id="submitBtn">
              Send My Reply
            </button>
            <button type="button" class="btn-back" onclick="goBack()">
              Go Back
            </button>
          </div>

          <div class="status-message" id="statusMessage"></div>
        </form>
      </div>

      <!-- Thank You Container -->
      <div class="thank-you-container" id="thankYouContainer">
        <div class="heart-icon">💌✨</div>
        <div class="thank-you-title">Thank You!</div>
        <div class="thank-you-message">
          Your beautiful message has been received with joy.<br>
          It will be treasured forever. 💖
        </div>
        <button class="btn-submit" onclick="goBack()" style="margin-top: 30px;">
          Return Home
        </button>
      </div>
    </div>
  </div>

  <script>
    // Generate floating hearts
    function generateHearts() {
      const container = document.getElementById('heartContainer');
      const hearts = ['💖', '💕', '💗', '💝', '✨'];
      
      for (let i = 0; i < 15; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDelay = Math.random() * 2 + 's';
        heart.style.animationDuration = (5 + Math.random() * 3) + 's';
        container.appendChild(heart);
      }
    }

    // Submit reply
    async function submitReply(event) {
      event.preventDefault();

      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const statusMessage = document.getElementById('statusMessage');

      if (!name || !message) {
        statusMessage.textContent = '❌ Please fill in all fields';
        statusMessage.className = 'status-message error';
        statusMessage.style.display = 'block';
        return;
      }

      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="loading"></div>';

      try {
        const response = await fetch('/submit-reply', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, message })
        });

        const data = await response.json();

        if (response.ok) {
          // Show success animation
          createSparkles();
          
          // Hide form and show thank you message
          setTimeout(() => {
            document.getElementById('formContainer').classList.add('hidden');
            document.getElementById('thankYouContainer').classList.add('active');
          }, 500);
        } else {
          statusMessage.textContent = '❌ ' + (data.error || 'Failed to submit reply');
          statusMessage.className = 'status-message error';
          statusMessage.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Send My Reply';
        }
      } catch (error) {
        console.error('Error:', error);
        statusMessage.textContent = '❌ Network error. Please try again.';
        statusMessage.className = 'status-message error';
        statusMessage.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Send My Reply';
      }
    }

    // Create sparkle effect
    function createSparkles() {
      const card = document.querySelector('.card');
      for (let i = 0; i < 15; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.textContent = '✨';
        sparkle.style.left = Math.random() * 100 + '%';
        sparkle.style.top = Math.random() * 100 + '%';
        sparkle.style.fontSize = (10 + Math.random() * 20) + 'px';
        sparkle.style.animation = `sparkle ${0.6 + Math.random() * 0.4}s ease-out forwards`;
        card.appendChild(sparkle);
        
        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    // Go back
    function goBack() {
      window.location.href = '/';
    }

    // Initialize
    generateHearts();
  </script>
</body>
</html>
