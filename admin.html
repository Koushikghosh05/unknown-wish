<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Bristi's Replies 👑</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&family=Inter:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', sans-serif;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.6s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      color: white;
      margin-bottom: 10px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      font-weight: 600;
    }

    .header-subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      justify-content: center;
      flex-wrap: wrap;
      animation: slideUp 0.6s ease 0.2s both;
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: 2px solid white;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid white;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-3px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      animation: slideUp 0.6s ease 0.3s both;
    }

    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: #667eea;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .stat-label {
      color: #999;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .loading {
      text-align: center;
      color: white;
      font-size: 18px;
      margin: 40px 0;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .replies-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      animation: slideUp 0.6s ease 0.4s both;
    }

    .reply-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      border-left: 4px solid #667eea;
      position: relative;
      overflow: hidden;
    }

    .reply-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .reply-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      border-left-color: #764ba2;
    }

    .reply-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
      position: relative;
      z-index: 1;
    }

    .reply-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #667eea;
      font-weight: 600;
      word-break: break-word;
    }

    .reply-date {
      font-size: 12px;
      color: #aaa;
      text-align: right;
      white-space: nowrap;
    }

    .reply-time {
      font-size: 12px;
      color: #aaa;
    }

    .reply-message {
      color: #555;
      line-height: 1.8;
      font-size: 15px;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    .empty-state {
      text-align: center;
      color: white;
      padding: 60px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .empty-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .empty-message {
      font-size: 16px;
      opacity: 0.8;
    }

    .badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .header-title {
        font-size: 32px;
      }

      .replies-container {
        grid-template-columns: 1fr;
      }

      .controls {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-title">👑 Bristi's Wishes</div>
      <div class="header-subtitle">Messages from the heart...</div>
    </div>

    <div class="controls">
      <button class="btn-primary" onclick="loadReplies()">🔄 Refresh</button>
      <button class="btn-secondary" onclick="goBack()">← Back</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalCount">0</div>
        <div class="stat-label">Total Messages</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="lastUpdate">--</div>
        <div class="stat-label">Last Updated</div>
      </div>
    </div>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p style="margin-top: 15px;">Loading messages...</p>
    </div>

    <div id="repliesContainer" class="replies-container"></div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-icon">💌</div>
      <div class="empty-title">No Messages Yet</div>
      <div class="empty-message">Be the first one to send a heartfelt reply!</div>
    </div>
  </div>

  <div class="footer">
    <p>💖 Admin Panel v1.0 - Made with love</p>
  </div>

  <script>
    let lastLoadTime = null;

    async function loadReplies() {
      const container = document.getElementById('repliesContainer');
      const loading = document.getElementById('loading');
      const emptyState = document.getElementById('emptyState');

      loading.style.display = 'block';
      container.innerHTML = '';
      emptyState.style.display = 'none';

      try {
        const response = await fetch('/get-replies');
        const data = await response.json();
        const replies = data.replies || [];

        loading.style.display = 'none';

        // Update stats
        document.getElementById('totalCount').textContent = replies.length;
        
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const mins = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('lastUpdate').textContent = `${hours}:${mins}`;

        if (replies.length === 0) {
          emptyState.style.display = 'block';
          return;
        }

        // Display replies
        replies.forEach((reply, index) => {
          const card = createReplyCard(reply, index);
          container.appendChild(card);
        });
      } catch (error) {
        console.error('Error loading replies:', error);
        loading.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.innerHTML = `
          <div class="empty-icon">❌</div>
          <div class="empty-title">Error Loading Messages</div>
          <div class="empty-message">${error.message}</div>
        `;
      }
    }

    function createReplyCard(reply, index) {
      const card = document.createElement('div');
      card.className = 'reply-card';
      card.style.animation = `slideUp 0.6s ease ${0.1 * index}s both`;

      const date = new Date(reply.date);
      const dateStr = date.toLocaleDateString('en-US', { 
        month: 'short', 
        day: 'numeric',
        year: 'numeric'
      });
      const timeStr = date.toLocaleTimeString('en-US', { 
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });

      card.innerHTML = `
        <div class="reply-header">
          <div class="reply-name">💝 ${escapeHtml(reply.name)}</div>
          <div>
            <div class="reply-date">${dateStr}</div>
            <div class="reply-time">${timeStr}</div>
          </div>
        </div>
        <div class="reply-message">${escapeHtml(reply.message)}</div>
        <div style="margin-top: 15px;">
          <span class="badge">Message #{reply.id}</span>
        </div>
      `;

      return card;
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    function goBack() {
      window.location.href = '/';
    }

    // Load replies on page load
    loadReplies();

    // Auto-refresh every 10 seconds
    setInterval(loadReplies, 10000);
  </script>
</body>
</html>
