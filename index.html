<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unknown Wishing Site</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #fdf6ee;
    font-family: 'Inter', sans-serif;
  }

  /* ─────────────── STAGE 1 ─────────────── */
  #stage1 {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #fdf0e8 0%, #fde8f0 40%, #f9eef8 70%, #fdf0e8 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.8s ease;
  }

  /* Floral border SVGs */
  .floral-corner {
    position: absolute;
    width: 200px; height: 200px;
    opacity: 0.85;
  }
  .floral-corner.tl { top: 0; left: 0; }
  .floral-corner.tr { top: 0; right: 0; transform: scaleX(-1); }
  .floral-corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .floral-corner.br { bottom: 0; right: 0; transform: scale(-1, -1); }

  .floral-side {
    position: absolute;
    opacity: 0.6;
  }

  #balloon-wrap {
    display: flex; flex-direction: column; align-items: center;
    animation: floatBalloon 3s ease-in-out infinite;
    cursor: pointer;
    user-select: none;
  }

  @keyframes floatBalloon {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }

  #balloon-svg { width: 220px; height: 300px; }

  /* Pop particles */
  .particle {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 0.8s ease-out forwards;
  }

  @keyframes explode {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* Countdown animation */
  #tap-me-text {
    transition: opacity 0.4s ease;
  }

  #tap-me-text.fade-out {
    opacity: 0;
  }

  #countdown-text {
    opacity: 0;
    font-size: 56px;
    font-weight: 700;
    fill: white;
    text-anchor: middle;
  }

  @keyframes countdownPulse {
    0% {
      opacity: 1;
      font-size: 56px;
    }
    70% {
      opacity: 1;
      font-size: 56px;
    }
    100% {
      opacity: 0;
      font-size: 80px;
    }
  }

  /* ─────────────── STAGE 2 ─────────────── */
  #stage2 {
    position: fixed; inset: 0;
    display: none;
    overflow: hidden;
  }

  #space-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  #header-text {
    position: absolute; top: 28px; left: 0; right: 0;
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(24px, 4vw, 46px);
    color: #f9d98a;
    text-shadow: 0 0 30px rgba(249,217,138,0.6), 0 0 60px rgba(249,217,138,0.3);
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
  }

  #age-counter {
    position: absolute; bottom: 24px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: clamp(6px, 1.5vw, 20px);
    z-index: 10;
    pointer-events: none;
    flex-wrap: wrap;
    padding: 0 12px;
  }

  .age-unit {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(249,217,138,0.25);
    border-radius: 10px;
    padding: 8px 14px;
    min-width: 58px;
  }

  .age-num {
    font-family: 'Inter', sans-serif;
    font-size: clamp(18px, 3vw, 32px);
    font-weight: 300;
    color: #f9d98a;
    text-shadow: 0 0 12px rgba(249,217,138,0.5);
    letter-spacing: 2px;
    line-height: 1;
  }

  .age-label {
    font-size: 9px;
    color: rgba(249,217,138,0.55);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  #age-counter-label {
    position: absolute; bottom: 100px; left: 0; right: 0;
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(18px, 2.5vw, 28px);
    color: #f9d98a;
    text-shadow: 0 0 15px rgba(249,217,138,0.4);
    letter-spacing: 1px;
    z-index: 10;
    pointer-events: none;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(15, 8, 30, 0.88);
    border: 1px solid rgba(249,217,138,0.35);
    border-radius: 12px;
    padding: 10px 16px;
    max-width: 220px;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.25s;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: #f4e4b8;
    line-height: 1.6;
    text-align: center;
  }

  /* Cloud button */
  #cloud-btn {
    position: absolute;
    cursor: pointer;
    z-index: 20;
    display: none;
    transform: translate(-50%, -50%);
    animation: cloudFloat 4s ease-in-out infinite;
    transition: filter 0.2s;
  }

  #cloud-btn:hover { filter: brightness(1.2); }

  @keyframes cloudFloat {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-10px); }
  }

  .cloud-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Dancing Script', cursive;
    font-size: 14px;
    color: #4a3060;
    text-align: center;
    pointer-events: none;
    line-height: 1.4;
    width: 110px;
  }

  /* Shooting star canvas overlay */
  #star-canvas {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 15;
  }

</style>
</head>

<!-- Audio: place these files in /public/ so Vite serves them at /countdown.mp3 and /birthday_song.mp3 -->
<audio id="audio-countdown" src="/countdown.mp3" preload="auto"></audio>
<audio id="audio-birthday" src="/birthday_song.mp3" preload="auto" loop></audio>

<script>
// ─────────────────────────────────────────────
// BIRTHDAY: 12 May 2006, 00:00:00 AM local time
// ─────────────────────────────────────────────
const BIRTHDAY = new Date(2006, 4, 12, 0, 0, 0, 0); // Month is 0-indexed

// ─────────────────────────────────────────────
// STAGE 1 — BALLOON POP
// countdown.mp3 is 2.83 seconds
// "1" is spoken at ~2.0s, balloon pops at ~2.5s
// ─────────────────────────────────────────────
let stage1Started = false;

function startStage1Countdown() {
  if (stage1Started) return;
  stage1Started = true;

  // Fade out "Tap Me" text
  const tapMeText = document.getElementById('tap-me-text');
  tapMeText.classList.add('fade-out');

  // Start audio immediately
  const audio = document.getElementById('audio-countdown');
  audio.currentTime = 0;

  audio.play().then(() => {
    // Sync visual countdown with audio:
    // "3" is spoken at ~0.3s
    setTimeout(() => showNumber('3'), 300);
    // "2" is spoken at ~1.1s
    setTimeout(() => showNumber('2'), 1100);
    // "1" is spoken at ~2.0s
    setTimeout(() => showNumber('1'), 2000);
    // Pop balloon at ~2.5s when audio ends
    setTimeout(() => popBalloon(), 2500);
  }).catch(() => {
    // If audio fails, still show visual countdown and pop
    setTimeout(() => showNumber('3'), 300);
    setTimeout(() => showNumber('2'), 1100);
    setTimeout(() => showNumber('1'), 2000);
    setTimeout(() => popBalloon(), 2500);
  });

  function showNumber(num) {
    const countdownText = document.getElementById('countdown-text');
    countdownText.textContent = num;
    countdownText.style.opacity = '1';
    countdownText.style.fontSize = '56px';
    countdownText.style.animation = 'none';
    
    // Trigger animation
    setTimeout(() => {
      countdownText.style.animation = 'countdownPulse 0.9s ease-out forwards';
    }, 10);
  }
}

// No longer auto-start - wait for user to click the balloon
// window.addEventListener('load', () => {
//   // Autoplay is now blocked by browsers - user must click the balloon
// });

function popBalloon() {
  // Pop sound (oscillator-based — no file needed)
  playPopSound();

  const wrap = document.getElementById('balloon-wrap');
  const rect = wrap.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  // Shatter balloon
  const balloonSvg = document.getElementById('balloon-svg');
  balloonSvg.style.transition = 'transform 0.15s ease, opacity 0.2s ease';
  balloonSvg.style.transform = 'scale(1.15)';
  setTimeout(() => {
    balloonSvg.style.transform = 'scale(0.1)';
    balloonSvg.style.opacity = '0';
  }, 80);

  // Particles
  const colors = ['#f06080','#fbd5a0','#c8a8e8','#a8d4f0','#f4d0a8','#f9d98a','#ffb3c6'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 80 + Math.random() * 160;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*10}px; height:${6+Math.random()*10}px;
      --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px;
      animation-duration:${0.6+Math.random()*0.5}s;
    `;
    container.appendChild(p);
  }

  // Transition to Stage 2 after 0.8s
  setTimeout(() => {
    const s1 = document.getElementById('stage1');
    s1.style.opacity = '0';
    setTimeout(() => {
      s1.style.display = 'none';
      startStage2();
    }, 800);
  }, 800);
}

function playPopSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2) * 0.7;
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.7, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1200;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

// ─────────────────────────────────────────────
// STAGE 2 — COSMIC SOLAR SYSTEM
// ─────────────────────────────────────────────
let canvas, ctx, starCanvas, starCtx;
let W, H, SUN_X, SUN_Y;
let planets = [];
let bgStars = [];
let animFrameId;
let shootingStarActive = false;
let shootingStarProgress = 0;
let shootingStarStart = null;
let shootingStarDuration = 12000; // 12 seconds
let cloudVisible = false;
let impactDone = false;

// Bristi's planet index (last planet = outermost)
const BRISTI_IDX = 7;
const MR_UNKNOWN_IDX = 6;

const PLANET_DATA = [
  {
    name: 'Mercury', color: '#b5b5b5', glow: '#d0cfc8',
    size: 5, orbitA: 0.06, orbitB: 0.035, speed: 0.018,
    angle0: 1.2,
    msg: "Swift and sure — may your decisions always find the right path..."
  },
  {
    name: 'Venus', color: '#f5c78a', glow: '#f9dca8',
    size: 9, orbitA: 0.1, orbitB: 0.06, speed: 0.013,
    angle0: 2.5,
    msg: "The planet of love whispers: may your heart always be warm and full..."
  },
  {
    name: 'Earth', color: '#5ba4cf', glow: '#7ec8e3',
    size: 10, orbitA: 0.14, orbitB: 0.085, speed: 0.010,
    angle0: 0.8,
    msg: "Home is wherever you bloom — and you bloom everywhere, dear..."
  },
  {
    name: 'Mars', color: '#d46a4a', glow: '#e08060',
    size: 8, orbitA: 0.18, orbitB: 0.11, speed: 0.008,
    angle0: 3.8,
    msg: "Brave and fierce — may you conquer every dream you dare to dream..."
  },
  {
    name: 'Jupiter', color: '#c8a878', glow: '#e0c090',
    size: 18, orbitA: 0.24, orbitB: 0.15, speed: 0.005,
    angle0: 1.6,
    msg: "Vast and magnificent, like your potential — the universe is yours..."
  },
  {
    name: 'Saturn', color: '#e8d080', glow: '#f0e0a0',
    size: 15, orbitA: 0.30, orbitB: 0.19, speed: 0.003,
    angle0: 4.2,
    hasRing: true,
    msg: "Adorned with rings of grace — may every year bring you new beauty..."
  },
  {
    name: 'Mr. Unknown', color: '#a080d8', glow: '#c0a0f0',
    size: 13, orbitA: 0.37, orbitB: 0.245, speed: 0.0012,
    angle0: Math.PI * 1.55, // starts upper-left
    isSpecial: true, isMrUnknown: true,
    msg: "I've been watching from afar, silently wishing you the very best..."
  },
  {
    name: 'Bristi', color: '#f080a8', glow: '#ff99bb',
    size: 14, orbitA: 0.44, orbitB: 0.30, speed: 0.0009,
    angle0: 0.0, // starts right side, will reach lower-right naturally
    isSpecial: true, isBristi: true,
    msg: "The brightest star in this universe is you..."
  }
];

function startStage2() {
  document.getElementById('stage2').style.display = 'block';

  canvas = document.getElementById('space-canvas');
  ctx = canvas.getContext('2d');
  starCanvas = document.getElementById('star-canvas');
  starCtx = starCanvas.getContext('2d');

  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  generateStars();
  initPlanets();
  startAgeCounter();

  // Start birthday music
  const music = document.getElementById('audio-birthday');
  music.volume = 0.7;
  music.play().catch(() => {});

  // Canvas hover/click for tooltips
  canvas.addEventListener('mousemove', handleMouseMove);
  canvas.addEventListener('click', handleCanvasClick);

  animFrameId = requestAnimationFrame(gameLoop);
}

function resizeCanvases() {
  W = canvas.width = starCanvas.width = window.innerWidth;
  H = canvas.height = starCanvas.height = window.innerHeight;
  // Sun slightly right of center
  SUN_X = W * 0.54;
  SUN_Y = H * 0.50;
  generateStars();
  syncPlanetOrbitsFromLayout();
  updatePlanetPositions();
}

function generateStars() {
  bgStars = [];
  for (let i = 0; i < 380; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.2,
      alpha: Math.random() * 0.6 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
      color: ['#ffffff','#ffe8d0','#d0e8ff','#ffd0f0','#d0ffd0'][Math.floor(Math.random()*5)]
    });
  }
}

function syncPlanetOrbitsFromLayout() {
  if (!planets || !planets.length) return;
  planets.forEach((p, i) => {
    const d = PLANET_DATA[i];
    p.orbitRx = W * d.orbitA;
    p.orbitRy = H * d.orbitB;
  });
}

function initPlanets() {
  planets = PLANET_DATA.map((d, i) => ({
    ...d,
    angle: d.angle0,
    orbitRx: W * d.orbitA,
    orbitRy: H * d.orbitB,
    x: 0, y: 0,
    transformed: false // for Bristi
  }));
  updatePlanetPositions();
}

function updatePlanetPositions() {
  planets.forEach(p => {
    p.x = SUN_X + p.orbitRx * Math.cos(p.angle);
    p.y = SUN_Y + p.orbitRy * Math.sin(p.angle);
  });
}

// Find angle on Bristi's orbit closest to lower-right corner
function getLowerRightAngle() {
  // Lower-right corner of screen is (W*0.88, H*0.82)
  const targetX = W * 0.88;
  const targetY = H * 0.82;
  // Find angle that minimizes distance to target on Bristi's ellipse
  const bp = planets[BRISTI_IDX];
  let bestAngle = 0, bestDist = Infinity;
  for (let a = 0; a < Math.PI * 2; a += 0.01) {
    const px = SUN_X + bp.orbitRx * Math.cos(a);
    const py = SUN_Y + bp.orbitRy * Math.sin(a);
    const d = Math.hypot(px - targetX, py - targetY);
    if (d < bestDist) { bestDist = d; bestAngle = a; }
  }
  return bestAngle;
}

// Shooting-star launch is driven in gameLoop (fps-safe, matches resize).
let prevMsToBristiLowerRight = Infinity;

let shootingStarOriginX, shootingStarOriginY;
let starParticles = [];

function launchShootingStar() {
  if (shootingStarActive) return;
  shootingStarActive = true;
  shootingStarStart = performance.now();
  // Origin: Mr. Unknown's current position
  const mu = planets[MR_UNKNOWN_IDX];
  shootingStarOriginX = mu.x;
  shootingStarOriginY = mu.y;
  starParticles = [];
}

let hoveredPlanet = null;
const tooltip = document.getElementById('tooltip');

function handleMouseMove(e) {
  const mx = e.clientX, my = e.clientY;
  hoveredPlanet = null;
  for (const p of planets) {
    if (p.transformed && p.isBristi) continue;
    const dist = Math.hypot(mx - p.x, my - p.y);
    if (dist < p.size + 10) { hoveredPlanet = p; break; }
  }
  if (hoveredPlanet) {
    tooltip.style.opacity = '1';
    tooltip.textContent = hoveredPlanet.msg;
    let tx = mx + 18, ty = my - 60;
    if (tx + 230 > W) tx = mx - 240;
    if (ty < 10) ty = my + 20;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.opacity = '0';
    canvas.style.cursor = 'default';
  }
}

function handleCanvasClick(e) {
  // nothing special on click currently
}

let lastTime = 0;
function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  let dt = ts - lastTime;
  lastTime = ts;
  if (dt > 64) dt = 64;
  if (dt < 1) dt = 16.7;
  const frameScale = dt / (1000 / 60);

  // Update planet angles (frame-rate independent: speed was tuned for ~60fps)
  planets.forEach((p, i) => {
    if (!p.transformed) {
      p.angle += p.speed * frameScale;
    }
  });
  updatePlanetPositions();

  // Launch shooting star when Bristi is ~shootingStarDuration ms from the lower-right target (stable vs fps/resize)
  if (!impactDone && !shootingStarActive && planets[BRISTI_IDX]) {
    const bp = planets[BRISTI_IDX];
    const ta = getLowerRightAngle();
    let rem = ta - bp.angle;
    while (rem < 0) rem += 2 * Math.PI;
    const radPerMs = (bp.speed * 60) / 1000;
    const msToTarget = rem / radPerMs;
    if (prevMsToBristiLowerRight > shootingStarDuration && msToTarget <= shootingStarDuration) {
      launchShootingStar();
    }
    prevMsToBristiLowerRight = msToTarget;
  }

  // Update shooting star
  let starT = 0;
  let starX, starY;
  if (shootingStarActive && !impactDone) {
    const elapsed = performance.now() - shootingStarStart;
    starT = Math.min(elapsed / shootingStarDuration, 1);

    const target = planets[BRISTI_IDX];
    // Ease-in-out curve
    const t = starT < 0.5 ? 2*starT*starT : -1+(4-2*starT)*starT;
    // Slightly track Bristi's current position
    const trackFactor = Math.pow(starT, 1.5);
    const targetX = shootingStarOriginX + (target.x - shootingStarOriginX) * t + (target.x - (shootingStarOriginX + (target.x - shootingStarOriginX)*t)) * trackFactor * 0.3;
    const targetY = shootingStarOriginY + (target.y - shootingStarOriginY) * t + (target.y - (shootingStarOriginY + (target.y - shootingStarOriginY)*t)) * trackFactor * 0.3;
    starX = targetX;
    starY = targetY;

    // Add trail particle
    starParticles.push({ x: starX, y: starY, life: 1.0 });

    if (starT >= 1.0) {
      // Impact!
      impactDone = true;
      shootingStarActive = false;
      showCloudButton(target.x, target.y);
      planets[BRISTI_IDX].transformed = true;
    }
  }

  // Fade old trail particles
  starParticles = starParticles.filter(p => p.life > 0.01);
  starParticles.forEach(p => p.life *= 0.94);

  // Draw everything
  drawSpace(starT, starX, starY);

  animFrameId = requestAnimationFrame(gameLoop);
}

function drawSpace(starT, starX, starY) {
  // Background
  ctx.fillStyle = '#020010';
  ctx.fillRect(0, 0, W, H);

  // Milky Way glow band
  const mwGrad = ctx.createLinearGradient(0, H*0.2, W, H*0.8);
  mwGrad.addColorStop(0, 'rgba(40,20,80,0)');
  mwGrad.addColorStop(0.3, 'rgba(60,30,100,0.18)');
  mwGrad.addColorStop(0.5, 'rgba(80,50,120,0.22)');
  mwGrad.addColorStop(0.7, 'rgba(60,30,100,0.18)');
  mwGrad.addColorStop(1, 'rgba(40,20,80,0)');
  ctx.fillStyle = mwGrad;
  ctx.fillRect(0, 0, W, H);

  // Background stars
  const now = performance.now() / 1000;
  bgStars.forEach(s => {
    const alpha = s.alpha * (0.7 + 0.3 * Math.sin(now * s.twinkleSpeed * 60 + s.twinklePhase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Draw orbit ellipses
  planets.forEach((p, i) => {
    ctx.save();
    ctx.translate(SUN_X, SUN_Y);
    ctx.beginPath();
    ctx.ellipse(0, 0, p.orbitRx, p.orbitRy, 0, 0, Math.PI * 2);
    ctx.strokeStyle = p.isSpecial
      ? (p.isBristi ? 'rgba(240,128,168,0.22)' : 'rgba(160,128,216,0.22)')
      : 'rgba(249,217,138,0.09)';
    ctx.lineWidth = p.isSpecial ? 0.8 : 0.5;
    ctx.stroke();
    ctx.restore();
  });

  // Draw Sun
  const sunGlow = ctx.createRadialGradient(SUN_X, SUN_Y, 0, SUN_X, SUN_Y, 70);
  sunGlow.addColorStop(0, 'rgba(255,240,180,1)');
  sunGlow.addColorStop(0.2, 'rgba(255,200,80,0.9)');
  sunGlow.addColorStop(0.5, 'rgba(255,140,20,0.4)');
  sunGlow.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.beginPath();
  ctx.arc(SUN_X, SUN_Y, 70, 0, Math.PI * 2);
  ctx.fillStyle = sunGlow;
  ctx.fill();
  // Sun core
  const sunCore = ctx.createRadialGradient(SUN_X-5, SUN_Y-5, 0, SUN_X, SUN_Y, 28);
  sunCore.addColorStop(0, '#fffde0');
  sunCore.addColorStop(0.5, '#ffe060');
  sunCore.addColorStop(1, '#ff9020');
  ctx.beginPath();
  ctx.arc(SUN_X, SUN_Y, 28, 0, Math.PI * 2);
  ctx.fillStyle = sunCore;
  ctx.fill();
  // Sun label
  ctx.fillStyle = 'rgba(255,240,180,0.7)';
  ctx.font = '10px Inter';
  ctx.textAlign = 'center';
  ctx.fillText('Sun', SUN_X, SUN_Y + 44);

  // Draw planets
  planets.forEach((p, i) => {
    if (p.transformed) return; // Bristi replaced by cloud

    const px = p.x, py = p.y;

    // Planet glow
    const gGrad = ctx.createRadialGradient(px, py, 0, px, py, p.size * 3);
    gGrad.addColorStop(0, p.glow + '60');
    gGrad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(px, py, p.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = gGrad;
    ctx.fill();

    // Saturn ring (behind planet)
    if (p.hasRing) {
      ctx.save();
      ctx.translate(px, py);
      ctx.scale(1, 0.35);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 2.2, p.size * 2.2, 0, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(220,200,120,0.55)';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.restore();
    }

    // Planet body
    const pGrad = ctx.createRadialGradient(px - p.size*0.3, py - p.size*0.3, 0, px, py, p.size);
    pGrad.addColorStop(0, lightenColor(p.color, 50));
    pGrad.addColorStop(0.6, p.color);
    pGrad.addColorStop(1, darkenColor(p.color, 40));
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = pGrad;
    ctx.fill();

    // Bristi sparkle effect
    if (p.isBristi) {
      const t = performance.now() / 800;
      for (let s = 0; s < 5; s++) {
        const sa = t + s * Math.PI * 2 / 5;
        const sx = px + Math.cos(sa) * (p.size + 6);
        const sy = py + Math.sin(sa) * (p.size + 6);
        ctx.beginPath();
        ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,200,220,0.7)';
        ctx.fill();
      }
    }

    // Mr. Unknown subtle pulse
    if (p.isMrUnknown) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 600);
      ctx.beginPath();
      ctx.arc(px, py, p.size + 4 + pulse * 4, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(160,128,216,${0.2 + pulse * 0.15})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Planet name label
    ctx.fillStyle = p.isSpecial ? (p.isBristi ? '#ffb0c8' : '#c8a8f0') : 'rgba(249,217,138,0.6)';
    ctx.font = p.isSpecial ? `bold 11px Inter` : '9px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, px, py + p.size + 13);
  });

  // Draw shooting star trail
  if (starParticles.length > 0) {
    for (let i = 1; i < starParticles.length; i++) {
      const p1 = starParticles[i-1];
      const p2 = starParticles[i];
      const life = p2.life;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = `rgba(255,230,150,${life * 0.9})`;
      ctx.lineWidth = life * 3;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Sparkle dots on trail
      if (Math.random() < 0.3) {
        ctx.beginPath();
        ctx.arc(p2.x + (Math.random()-0.5)*6, p2.y + (Math.random()-0.5)*6, Math.random()*2, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,200,${life * 0.6})`;
        ctx.fill();
      }
    }

    // Star head
    if (shootingStarActive && starX !== undefined) {
      const headGrad = ctx.createRadialGradient(starX, starY, 0, starX, starY, 12);
      headGrad.addColorStop(0, 'rgba(255,255,255,1)');
      headGrad.addColorStop(0.4, 'rgba(255,240,150,0.8)');
      headGrad.addColorStop(1, 'rgba(255,200,80,0)');
      ctx.beginPath();
      ctx.arc(starX, starY, 12, 0, Math.PI * 2);
      ctx.fillStyle = headGrad;
      ctx.fill();
    }
  }
}

function lightenColor(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darkenColor(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

function showCloudButton(x, y) {
  const btn = document.getElementById('cloud-btn');
  btn.style.left = x + 'px';
  btn.style.top = y + 'px';
  btn.style.display = 'block';
  btn.style.opacity = '0';
  btn.style.transition = 'opacity 0.8s ease';
  setTimeout(() => btn.style.opacity = '1', 50);
}

// ─────────────────────────────────────────────
// AGE COUNTER
// ─────────────────────────────────────────────
function startAgeCounter() {
  updateAge();
  setInterval(updateAge, 1000);
}

function updateAge() {
  const now = new Date();
  const diff = now - BIRTHDAY;
  if (diff < 0) return;

  let years = now.getFullYear() - BIRTHDAY.getFullYear();
  let months = now.getMonth() - BIRTHDAY.getMonth();
  let days = now.getDate() - BIRTHDAY.getDate();

  // Adjust days if negative
  if (days < 0) {
    months--;
    const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
    days += prevMonth.getDate();
  }

  // Adjust months if negative
  if (months < 0) {
    years--;
    months += 12;
  }

  const hours = now.getHours();
  const mins = now.getMinutes();
  const secs = now.getSeconds();

  document.getElementById('ac-years').textContent = years;
  document.getElementById('ac-months').textContent = months;
  document.getElementById('ac-days').textContent = days;
  document.getElementById('ac-hours').textContent = String(hours).padStart(2,'0');
  document.getElementById('ac-mins').textContent = String(mins).padStart(2,'0');
  document.getElementById('ac-secs').textContent = String(secs).padStart(2,'0');
}

function openReplyPage() {
  window.location.href = '/reply.html';
}
